<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول — لوحة إدارة جامعة الكنوز</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --navy:     #0c1b3e;
  --navy-d:   #081229;
  --teal:     #0e7c6b;
  --teal-l:   #13a892;
  --gold:     #c9a84c;
  --gold-l:   #e4c170;
  --white:    #ffffff;
  --gray-50:  #f8f9fc;
  --gray-100: #eef0f7;
  --gray-300: #cdd1e0;
  --gray-400: #9ba3bf;
  --gray-600: #5c6480;
  --danger:   #e53e3e;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'Cairo', sans-serif; }

/* ── Animated background ── */
body {
  background: var(--navy-d);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
  overflow: hidden;
}

.bg {
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 20% 80%, rgba(14,124,107,.22) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 80% 20%, rgba(201,168,76,.15) 0%, transparent 55%),
    var(--navy);
  z-index: 0;
}

/* Dot grid */
.bg::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: radial-gradient(circle, rgba(255,255,255,.055) 1px, transparent 1px);
  background-size: 32px 32px;
}

/* Diagonal shimmer */
.bg::after {
  content: '';
  position: absolute;
  inset: -100%;
  background: repeating-linear-gradient(
    45deg, transparent, transparent 50px,
    rgba(201,168,76,.025) 50px, rgba(201,168,76,.025) 51px
  );
  animation: shimmer 25s linear infinite;
}
@keyframes shimmer { to { transform: translateX(102px); } }

/* Floating glows */
.glow {
  position: fixed;
  border-radius: 50%;
  filter: blur(70px);
  pointer-events: none;
  animation: glowFloat 9s ease-in-out infinite;
}
.g1 { width: 400px; height: 400px; background: rgba(14,124,107,.18); top: -8%; left: -5%; animation-delay: 0s; }
.g2 { width: 300px; height: 300px; background: rgba(201,168,76,.13); bottom: -5%; right: -3%; animation-delay: -4s; }
.g3 { width: 200px; height: 200px; background: rgba(14,124,107,.12); top: 55%; right: 20%; animation-delay: -7s; }
@keyframes glowFloat {
  0%,100% { transform: translateY(0) scale(1); }
  50%      { transform: translateY(-24px) scale(1.06); }
}

/* ── Card ── */
.card {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 440px;
  background: var(--white);
  border-radius: 24px;
  box-shadow: 0 0 0 1px rgba(255,255,255,.08), 0 32px 72px rgba(0,0,0,.45), 0 0 60px rgba(201,168,76,.06);
  overflow: hidden;
  animation: rise .65s cubic-bezier(.16,1,.3,1) both;
}
@keyframes rise {
  from { opacity: 0; transform: translateY(32px) scale(.97); }
  to   { opacity: 1; transform: none; }
}

/* ── Card header ── */
.card-top {
  background: linear-gradient(145deg, var(--navy) 0%, #132452 100%);
  padding: 32px 36px 28px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.card-top::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    -50deg, transparent, transparent 22px,
    rgba(201,168,76,.04) 22px, rgba(201,168,76,.04) 23px
  );
}

/* Decorative gold lines */
.card-top::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity: .6;
}

.brand {
  display: inline-flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 14px;
  position: relative;
}

.brand-icon {
  width: 50px;
  height: 50px;
  background: linear-gradient(135deg, var(--gold), var(--gold-l));
  border-radius: 14px;
  display: grid;
  place-items: center;
  font-size: 22px;
  color: var(--navy);
  box-shadow: 0 6px 20px rgba(201,168,76,.45), 0 0 0 1px rgba(255,255,255,.15);
  flex-shrink: 0;
}

.brand-text { text-align: right; }
.brand-name { font-size: 18px; font-weight: 800; color: #fff; line-height: 1.2; }
.brand-name-en {
  font-family: 'Outfit', sans-serif;
  font-size: 11px;
  font-weight: 400;
  color: rgba(255,255,255,.45);
  letter-spacing: .5px;
}

.admin-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 14px;
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 20px;
  color: rgba(255,255,255,.55);
  font-size: 12px;
  position: relative;
}

/* ── Card body ── */
.card-body { padding: 32px 36px 0; }

.welcome { font-size: 22px; font-weight: 800; color: var(--navy); margin-bottom: 4px; }
.welcome-sub { font-size: 13px; color: var(--gray-400); margin-bottom: 26px; }

/* Error alert */
.err {
  display: none;
  align-items: center;
  gap: 8px;
  background: #fff5f5;
  border: 1px solid #fed7d7;
  border-radius: 10px;
  padding: 11px 14px;
  color: var(--danger);
  font-size: 13px;
  margin-bottom: 18px;
  animation: shake .4s ease;
}
.err.show { display: flex; }
@keyframes shake {
  0%,100% { transform: translateX(0); }
  25%      { transform: translateX(-6px); }
  75%      { transform: translateX(6px); }
}

/* Form groups */
.fg { margin-bottom: 18px; }
.fl {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 7px;
}
.fl label { font-size: 13px; font-weight: 600; color: var(--gray-600); }

.iw { position: relative; }

.fi {
  width: 100%;
  height: 48px;
  padding: 0 44px 0 14px;
  background: var(--gray-50);
  border: 1.5px solid var(--gray-100);
  border-radius: 12px;
  font-family: 'Cairo', sans-serif;
  font-size: 14px;
  color: var(--navy);
  outline: none;
  transition: border-color .2s, box-shadow .2s, background .2s;
}
.fi:focus {
  border-color: var(--teal);
  background: #fff;
  box-shadow: 0 0 0 3px rgba(14,124,107,.1);
}
.fi-icon {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--gray-400);
  font-size: 14px;
  pointer-events: none;
  transition: color .2s;
}
.fi:focus ~ .fi-icon { color: var(--teal); }

.pass-toggle {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  color: var(--gray-400);
  font-size: 14px;
  padding: 4px;
  transition: color .2s;
}
.pass-toggle:hover { color: var(--teal); }

/* Submit */
.btn-submit {
  width: 100%;
  height: 50px;
  background: linear-gradient(135deg, var(--navy), #162d5e);
  color: #fff;
  border: none;
  border-radius: 14px;
  font-family: 'Cairo', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  display: grid;
  place-items: center;
  gap: 8px;
  position: relative;
  overflow: hidden;
  transition: transform .2s, box-shadow .2s;
  box-shadow: 0 4px 18px rgba(12,27,62,.3);
  margin-top: 6px;
}
.btn-submit::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, var(--teal), var(--teal-l));
  opacity: 0;
  transition: opacity .3s;
}
.btn-submit:hover::after { opacity: 1; }
.btn-submit:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(12,27,62,.35); }
.btn-submit:active { transform: none; }
.btn-text, .btn-spin { position: relative; z-index: 1; }
.btn-spin {
  display: none;
  width: 20px;
  height: 20px;
  border: 2px solid rgba(255,255,255,.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
.btn-submit.loading .btn-text { display: none; }
.btn-submit.loading .btn-spin { display: block; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Demo box */
.demo {
  margin: 20px 0 0;
  padding: 14px 18px;
  background: linear-gradient(135deg, rgba(14,124,107,.07), rgba(14,124,107,.03));
  border: 1px solid rgba(14,124,107,.2);
  border-radius: 14px;
}
.demo-head {
  font-size: 11px;
  font-weight: 700;
  color: var(--teal);
  letter-spacing: .5px;
  text-transform: uppercase;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.demo-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 7px;
}
.demo-row:last-of-type { margin-bottom: 0; }
.demo-key { font-size: 12px; color: var(--gray-400); }
.demo-chip {
  font-family: 'Outfit', monospace;
  font-size: 12px;
  font-weight: 600;
  color: var(--navy);
  background: rgba(12,27,62,.07);
  padding: 3px 12px;
  border-radius: 8px;
  cursor: pointer;
  transition: background .15s, transform .1s;
  user-select: none;
}
.demo-chip:hover  { background: rgba(12,27,62,.13); }
.demo-chip:active { transform: scale(.97); }
.demo-note { font-size: 11px; color: var(--gray-400); margin-top: 9px; }

/* Footer */
.card-foot {
  text-align: center;
  padding: 18px 36px 22px;
  font-size: 11.5px;
  color: var(--gray-400);
  margin-top: 20px;
  border-top: 1px solid var(--gray-100);
}
</style>
</head>
<body>

<!-- Background -->
<div class="bg"></div>
<div class="glow g1"></div>
<div class="glow g2"></div>
<div class="glow g3"></div>

<!-- Card -->
<div class="card">

  <!-- Top -->
  <div class="card-top">
    <div class="brand">
      <div class="brand-icon"><i class="fa-solid fa-landmark"></i></div>
      <div class="brand-text">
        <div class="brand-name">جامعة الكنوز</div>
        <div class="brand-name-en">Al-Kunooz University</div>
      </div>
    </div>
    <div class="admin-tag">
      <i class="fa-solid fa-shield-halved"></i>
      لوحة الإدارة
    </div>
  </div>

  <!-- Body -->
  <div class="card-body">
    <h1 class="welcome">مرحباً بعودتك 👋</h1>
    <p class="welcome-sub">أدخل بياناتك للوصول إلى لوحة التحكم</p>

    <div class="err" id="err">
      <i class="fa-solid fa-circle-exclamation"></i>
      <span id="errMsg">بيانات الدخول غير صحيحة</span>
    </div>

    <form id="form" autocomplete="on">
      <!-- Username -->
      <div class="fg">
        <div class="fl"><label for="uname">اسم المستخدم</label></div>
        <div class="iw">
          <input type="text" class="fi" id="uname" placeholder="admin" autocomplete="username">
          <i class="fa-regular fa-user fi-icon"></i>
        </div>
      </div>

      <!-- Password -->
      <div class="fg">
        <div class="fl"><label for="pass">كلمة المرور</label></div>
        <div class="iw">
          <input type="password" class="fi" id="pass" placeholder="••••••••••" autocomplete="current-password">
          <i class="fa-solid fa-lock fi-icon"></i>
          <button type="button" class="pass-toggle" id="eyeBtn" onclick="toggleEye()">
            <i class="fa-regular fa-eye" id="eyeIco"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">
        <span class="btn-text"><i class="fa-solid fa-right-to-bracket"></i> تسجيل الدخول</span>
        <div class="btn-spin"></div>
      </button>
    </form>

    <!-- Demo credentials -->
    <div class="demo">
      <div class="demo-head"><i class="fa-solid fa-flask-vial"></i> بيانات تجريبية — Demo Account</div>
      <div class="demo-row">
        <span class="demo-key">اسم المستخدم</span>
        <span class="demo-chip" onclick="fill('uname',this)">admin</span>
      </div>
      <div class="demo-row">
        <span class="demo-key">كلمة المرور</span>
        <span class="demo-chip" onclick="fill('pass',this)">Admin@123456</span>
      </div>
      <p class="demo-note">انقر على القيمة لنسخها في الحقل تلقائياً</p>
    </div>
  </div>

  <div class="card-foot">© 2026 جامعة الكنوز · جميع الحقوق محفوظة</div>
</div>

<script>
const API = 'http://localhost:5000/api';

/* ── Fill demo field ── */
function fill(id, el) {
  document.getElementById(id).value = el.textContent.trim();
  el.style.background = 'rgba(14,124,107,.2)';
  setTimeout(() => el.style.background = '', 600);
}

/* ── Toggle password ── */
function toggleEye() {
  const fi  = document.getElementById('pass');
  const ico = document.getElementById('eyeIco');
  const show = fi.type === 'password';
  fi.type = show ? 'text' : 'password';
  ico.className = show ? 'fa-regular fa-eye-slash' : 'fa-regular fa-eye';
}

/* ── Login ── */
document.getElementById('form').addEventListener('submit', async e => {
  e.preventDefault();
  const btn     = document.getElementById('submitBtn');
  const errBox  = document.getElementById('err');
  const errMsg  = document.getElementById('errMsg');

  const username = document.getElementById('uname').value.trim();
  const password = document.getElementById('pass').value;

  errBox.classList.remove('show');

  if (!username || !password) {
    errMsg.textContent = 'يرجى إدخال اسم المستخدم وكلمة المرور';
    errBox.classList.add('show');
    return;
  }

  btn.classList.add('loading');

  try {
    const res  = await fetch(`${API}/auth/login`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ username, password }),
    });
    const data = await res.json();

    if (!data.success) throw new Error(data.message || 'بيانات الدخول غير صحيحة');

    localStorage.setItem('ku-admin-token', data.token);
    localStorage.setItem('ku-admin-user',  JSON.stringify(data.admin || {}));

    /* Smooth redirect */
    document.querySelector('.card').style.transform = 'scale(.97)';
    document.querySelector('.card').style.opacity = '0';
    document.querySelector('.card').style.transition = 'all .4s ease';
    setTimeout(() => { window.location.href = 'index.html'; }, 350);

  } catch (err) {
    errMsg.textContent = err.message;
    errBox.classList.add('show');
    btn.classList.remove('loading');
  }
});

/* ── Redirect if already logged in ── */
if (localStorage.getItem('ku-admin-token')) window.location.href = 'index.html';
</script>
</body>
</html>
