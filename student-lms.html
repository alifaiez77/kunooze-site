<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام التعليم الإلكتروني | Al-Kunooz University</title>
<meta name="description" content="البوابة الإلكترونية للطالب ونظام التعليم المدمج">
<link rel="stylesheet" href="styles/main.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div id="navbar-root"></div>

<section class="page-hero">
  <div class="page-hero-bg" style="background-image:url('image/6087photo_2026-02-25_08-34-46.webp');background-position:center;filter:brightness(0.2)"></div>
  <div class="page-hero-overlay"></div>
  <div class="container page-hero-content">
    <div class="breadcrumb" style="justify-content:center">
      <a href="index.html" data-t="nav_home">الرئيسية</a><i class="fa-solid fa-chevron-left"></i>
      <a href="students.html" data-t="nav_students">الطلاب</a><i class="fa-solid fa-chevron-left"></i>
      <span>نظام التعليم الإلكتروني</span>
    </div>
  </div>
</section>

<section class="portal-layout">
  <div class="container">
    
    <div class="reveal-scale" style="display:flex;flex-direction:column;align-items:center">
      <div class="portal-card">
        <div class="portal-icon"><i class="fa-solid fa-laptop-code"></i></div>
        <h1 class="pc-title">بوابة التعليم الإلكتروني</h1>
        <p class="pc-desc">يرجى تسجيل الدخول باستخدام البريد الجامعي الرسمي (@alkunooz.edu.iq) للوصول إلى المحاضرات والواجبات.</p>
        
        <form class="portal-form" data-form-submit>
          <div class="form-group">
            <label class="form-label">البريد الإلكتروني الجامعي</label>
            <div style="position:relative">
              <i class="fa-solid fa-envelope" style="position:absolute;top:50%;transform:translateY(-50%);inset-inline-start:16px;color:var(--gray-400)"></i>
              <input type="email" class="form-input" style="padding-inline-start:44px;direction:ltr" required placeholder="student@alkunooz.edu.iq">
            </div>
          </div>
          <div class="form-group" style="margin-bottom:32px">
            <label class="form-label">كلمة المرور</label>
            <div style="position:relative">
              <i class="fa-solid fa-lock" style="position:absolute;top:50%;transform:translateY(-50%);inset-inline-start:16px;color:var(--gray-400)"></i>
              <input type="password" class="form-input" style="padding-inline-start:44px;direction:ltr" required placeholder="••••••••">
            </div>
          </div>
          <button type="submit" class="btn btn-navy btn-lg" style="width:100%"><i class="fa-solid fa-right-to-bracket"></i>تسجيل الدخول للنظام</button>
        </form>

        <div class="portal-links">
          <a href="#">هل نسيت كلمة المرور؟</a>
          <a href="unit-it.html">تواصل مع الدعم الفني</a>
        </div>
      </div>

      <div class="support-strip reveal">
        <i class="fa-solid fa-headset" style="color:var(--navy);font-size:20px"></i>
        <span>هل تواجه مشكلة في الدخول؟ <a href="tel:009647000000005" dir="ltr" style="font-weight:800;color:var(--teal)">+964 700 000 0005</a></span>
      </div>
    </div>
    
  </div>
</section>

<script src="js/translations.js"></script>

  window.KU_PAGE='students.html';
